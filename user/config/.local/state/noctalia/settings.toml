config_version = 2

[audio]
enable_overdrive = true

[bar]
order = [ "default" ]

    [bar.default]
    background_opacity = 0.80000000000000004
    center = [ "widget_2", "active_window", "widget_3" ]
    concave_edge_corners = true
    end = [ "tray", "group:g1", "group:g4", "group:g3" ]
    margin_edge = 0
    margin_ends = 0
    padding = 5
    panel_overlap = 0
    radius = 0
    radius_bottom_left = 15
    radius_bottom_right = 15
    start = [ "group:g5", "group:g2", "group:g6", "group:g7", "summary" ]
    thickness = 35

        [bar.default.dead_zone]
        command = "noctalia msg panel-open control-center"

        [[bar.default.capsule_group]]
        enabled = true
        fill = "surface_variant"
        id = "g2"
        members = [ "workspaces" ]
        opacity = 1.0
        padding = 6.0

        [[bar.default.capsule_group]]
        enabled = true
        fill = "surface_variant"
        id = "g3"
        members = [ "date", "clock" ]
        opacity = 1.0
        padding = 6.0

        [[bar.default.capsule_group]]
        enabled = true
        fill = "surface_variant"
        id = "g4"
        members = [ "volume", "brightness" ]
        opacity = 1.0
        padding = 6.0

        [[bar.default.capsule_group]]
        enabled = true
        fill = "surface_variant"
        id = "g1"
        members = [ "network", "bluetooth" ]
        opacity = 1.0
        padding = 6.0

        [[bar.default.capsule_group]]
        enabled = true
        fill = "surface_variant"
        id = "g5"
        members = [ "session", "wallpaper", "clipboard" ]
        opacity = 1.0
        padding = 6.0

        [[bar.default.capsule_group]]
        enabled = true
        fill = "surface_variant"
        id = "g6"
        members = [ "battery", "temp", "cpu", "widget" ]
        opacity = 1.0
        padding = 6.0

        [[bar.default.capsule_group]]
        enabled = true
        fill = "surface_variant"
        id = "g7"
        members = [ "network_rx", "network_tx" ]
        opacity = 1.0
        padding = 6.0

[battery]
warning_threshold = 20

[brightness]
enable_ddcutil = true

[calendar]
enabled = true

    [calendar.account.personal_google]
    type = "google"

[control_center]
sidebar = "full"
sidebar_section = "full"

    [[control_center.shortcuts]]
    type = "wifi"

    [[control_center.shortcuts]]
    type = "bluetooth"

    [[control_center.shortcuts]]
    type = "caffeine"

    [[control_center.shortcuts]]
    type = "notification"

[desktop_widgets]
schema_version = 2
widget_order = [ "desktop-widget-0000000000000001" ]

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget.desktop-widget-0000000000000001]
    box_height = 176.0
    box_width = 272.0
    cx = 683.0
    cy = 120.0
    output = "eDP-1"
    rotation = 0.0
    type = "clock"

        [desktop_widgets.widget.desktop-widget-0000000000000001.settings]
        background = false
        clock_style = "digital"
        format = "{:%H:%M:%S}"
        shadow = true

[dock]
background_opacity = 0.80000000000000004
radius = 15

[idle]
behavior_order = [ "lock", "Sleep" ]
pre_action_fade_seconds = 10

    [idle.behavior.Sleep]
    action = "command"
    command = "isthissessionactive && systemctl sleep"
    enabled = true
    timeout = 600.0

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 60

[location]
auto_locate = true

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@HDMI-A-1", "lockscreen-login-box@VGA-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 961.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@VGA-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 961.0
    output = "VGA-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@VGA-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[notification]
background_opacity = 0.80000000000000004

[osd]
background_opacity = 0.5

[plugin_settings."gustav0ar/drive-health"]
system_collector_enabled = true

[plugins]
auto_update = true
enabled = [ "noctalia/translator", "aurelia/window_count", "aurelia/cpu_clock_speed", "gustav0ar/drive-health" ]

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/noctalia-dev/official-plugins"
    name = "official"

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/noctalia-dev/community-plugins"
    name = "community"

    [[plugins.source]]
    kind = "path"
    location = "~/.config/noctalia/local-plugins"
    name = "Local"

[shell]
avatar_path = "/home/aurelia/Pictures/icons/pfptrans.png"
date_format = "%A, %Y-%M-%d"
password_style = "random"
polkit_agent = true
screen_time_enabled = true
time_format = "{:%H:%M:%S}"
ui_scale = 0.80000000000000004

    [shell.launcher]
    app_grid = true
    session_search = true

    [shell.panel]
    control_center_placement = "floating"
    control_center_position = "center"
    floating_offset = 10
    launcher_compact = true
    session_placement = "floating"
    session_position = "center"
    transparency_mode = "soft"
    wallpaper_placement = "floating"
    wallpaper_position = "center"

    [shell.screen_corners]
    enabled = true
    size = 15

    [shell.screenshot]
    directory = "~/Pictures/screenshots/"

    [[shell.session.actions]]
    action = "command"
    command = "sudo loginctl lock-sessions"
    countdown_seconds = 0.0
    enabled = true
    glyph = "lock-filled"
    label = "Lock"
    shortcut = "l"
    variant = "default"

    [[shell.session.actions]]
    action = "command"
    command = "sudo loginctl lock-sessions && sleep 1 && systemctl sleep"
    countdown_seconds = 0.0
    enabled = true
    glyph = "suspend"
    label = "Sleep"
    shortcut = "p"
    variant = "default"

    [[shell.session.actions]]
    action = "command"
    command = "sudo loginctl lock-sessions && sleep 1 && systemctl hibernate"
    countdown_seconds = 0.0
    enabled = true
    glyph = "hibernate"
    label = "Hibernate"
    shortcut = "h"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    countdown_seconds = 0.0
    enabled = true
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    countdown_seconds = 0.0
    enabled = true
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    countdown_seconds = 0.0
    enabled = true
    variant = "destructive"

[system.monitor]
gpu_poll_seconds = 2

[theme]
builtin = "Dracula"
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-content"

    [theme.templates]
    builtin_ids = [ "btop", "gtk3", "gtk4", "kcolorscheme", "kitty", "mango", "qt" ]
    community_ids = [ "pywalfox", "vscode", "zed", "discord", "steam", "telegram" ]

[wallpaper]
directory = "~/Pictures/wallpapers"
transition_on_startup = true

    [wallpaper.default]
    path = "/home/aurelia/Pictures/wallpapers/pinkriver.jpeg"

    [wallpaper.last]
    path = "/home/aurelia/Pictures/wallpapers/pinkriver.jpeg"

    [wallpaper.monitors.HDMI-A-1]
    path = "/home/aurelia/Pictures/wallpapers/pinkriver.jpeg"

    [wallpaper.monitors.VGA-1]
    path = "/home/aurelia/Pictures/wallpapers/pinkriver.jpeg"

    [wallpaper.monitors.eDP-1]
    path = "/home/aurelia/Pictures/wallpapers/minecraft/a-little-over-grown-pond-between-some-houses-v0-74xlrfxsm1h61.webp"

[widget.Freq]
glyph = "clock"
tooltip = "CPU Frequency"
type = "custom_button"

[widget.active_window]
anchor = true
capsule = true
capsule_fill = "#000000"
interactive = false
min_length = 0
show_empty_label = true
title_scroll = "on_hover"

[widget.bongocat]
script = "scripts/bongocat.lua"
type = "scripted"

[widget.clock]
format = "{:%H:%M:%S %Z}"

[widget.cpu]
display = "text"

[widget.cpu_clock_speed]
show_glyph = false
type = "noctalia/cpu_clock_speed:cpu_clock_speed"

[widget.date]
format = "{:%a %Y-%m-%d}"

[widget.ram]
display = "text"
stat = "cpu_temp"

[widget.summary]
capsule = true
type = "gustav0ar/drive-health:summary"

[widget.temp]
display = "text"

[widget.tray]
capsule = true

[widget.widget]
type = "aurelia/cpu_clock_speed:widget"

[widget.widget_2]
direction = "left"
interactive = false
type = "aurelia/window_count:widget"

[widget.widget_3]
direction = "right"
interactive = false
type = "aurelia/window_count:widget"

[widget.window_count_2]
direction = "Position"
enabled = true
type = "noctalia/window_count:window_count"

[widget.window_count_3]
direction = "Right"
enabled = true
type = "noctalia/window_count:window_count"

[widget.workspaces]
hide_when_empty = true
labels_only_when_occupied = true