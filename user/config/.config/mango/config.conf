# More option see https://github.com/DreamMaoMao/mango/wiki/

# Window effect
blur=1
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 1
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=5
no_radius_when_single=0
focused_opacity=1
unfocused_opacity=1

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=400
animation_duration_focus=50
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.46,1.0,0.29,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=30
scroller_default_proportion=0.5
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
edge_scroller_focus_allow_speed=0.0
scroller_ignore_proportion_single=0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=2
smartgaps=0

# Dwindle Layout Setting
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=1
ov_no_resize=1
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=0
exchange_cross_monitor=1
focus_cross_monitor=1
focus_cross_tag=0
enable_floating_snap=1
snap_distance=15
cursor_size=24
drag_tile_to_tile=1
drag_tile_small=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=0
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=2.5
rootcolor=0x201b14ff
bordercolor=0x444444ff
dropcolor=0x8FBA7C55
splitcolor=0xEB441EFF
focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
# tagrule=id:1,layout_name:tile
# tagrule=id:2,layout_name:tile
# tagrule=id:3,layout_name:tile
# tagrule=id:4,layout_name:tile
# tagrule=id:5,layout_name:tile
# tagrule=id:6,layout_name:tile
# tagrule=id:7,layout_name:tile
# tagrule=id:8,layout_name:tile
# tagrule=id:9,layout_name:tile

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER+SHIFT,r,reload_config

# apps
bind=SUPER,t,spawn,term
bind=SUPER,e,spawn,explorer
bind=NONE,XF86Explorer,spawn,explorer

# power
bind=SUPER,l,spawn_shell,sudo loginctl lock-sessions
bind=SUPER,p,spawn_shell,sudo loginctl lock-sessions && sleep 1 && systemctl sleep
bind=SUPER,h,spawn_shell,sudo loginctl lock-sessions && sleep 1 && systemctl hibernate

# noctalia
bind=None,XF86Eject,spawn,eject
bind=SUPER,Comma,spawn,noctalia msg settings-open
bind=SUPER,b,spawn,noctalia msg bar-toggle
bind=SUPER,r,spawn,noctalia msg panel-open launcher
bind=SUPER,Print,spawn,noctalia msg screenshot-fullscreen pick
bind=None,Print,spawn,noctalia msg screenshot-region
bind=NONE,XF86LaunchA,spawn,noctalia msg panel-open launcher
bind=NONE,XF86Search,spawn,noctalia msg panel-open launcher
bind=NONE,XF86Tools,spawn,noctalia msg panel-open control-center
bind=NONE,XF86AudioMute,spawn,noctalia msg volume-mute
bind=NONE,XF86AudioRaiseVolume,spawn,noctalia msg volume-up 1
bind=NONE,XF86AudioLowerVolume,spawn,noctalia msg volume-down 1
bind=NONE,XF86AudioMicMute,spawn,noctalia msg mic-mute
bindl=NONE,XF86MonBrightnessUp,spawn,noctalia msg brightness-up current 5
bindl=NONE,XF86MonBrightnessDown,spawn,noctalia msg brightness-down current 5
bind=NONE,XF86AudioPlay,spawn,noctalia msg media toggle
bind=NONE,XF86AudioPause,spawn,noctalia msg media toggle
bind=NONE,XF86AudioForward,spawn,noctalia msg media next
bind=NONE,XF86AudioNext,spawn,noctalia msg media next
bind=NONE,XF86AudioRewind,spawn,noctalia msg media previous
bind=NONE,XF86AudioPrev,spawn,noctalia msg media previous
bind=NONE,XF86AudioStop,spawn,noctalia msg media stop
bindl=None,XF86Suspend,spawn,noctalia msg session lock-and-suspend
bindl=None,XF86Sleep,spawn,noctalia msg session lock-and-suspend
bindl=None,XF86ScreenSaver,spawn,noctalia msg session lock-and-suspend

# power
bind=SUPER+Alt,Delete,spawn,noctalia msg panel-open session
bind=NONE,XF86PowerOff,spawn,noctalia msg panel-open session

# exit
bind=SUPER,f4,killclient
bind=SUPER+SHIFT,f4,killclient,force

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=SUPER+shift,Tab,toggleoverview,
bind=SUPER,backslash,togglefloating,
bind=SUPER,a,togglemaximizescreen,
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=SUPER,z,toggle_scratchpad

# scroller layout
bind=SUPER,e,set_proportion,1.0
bind=SUPER,x,switch_proportion_preset,
bind=SUPER+ctrl,Left,scroller_stack,left
bind=SUPER+ctrl,Right,scroller_stack,right
bind=SUPER+ctrl,Up,scroller_stack,up
bind=SUPER+ctrl,Down,scroller_stack,down

# dwindle layout(manual split mode)
bind=SUPER+shift,Return,dwindle_toggle_split_direction

# switch layout
bind=SUPER,n,switch_layout

# tag switch
# bind=SUPER,Left,viewtoleft,0
# bind=CTRL,Left,viewtoleft_have_client,0
# bind=SUPER,Right,viewtoright,0
# bind=CTRL,Right,viewtoright_have_client,0
# bind=CTRL+SUPER,Left,tagtoleft,0
# bind=CTRL+SUPER,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=SUPER+shift,1,tagsilent,1,0
bind=SUPER+shift,2,tagsilent,2,0
bind=SUPER+shift,3,tagsilent,3,0
bind=SUPER+shift,4,tagsilent,4,0
bind=SUPER+shift,5,tagsilent,5,0
bind=SUPER+shift,6,tagsilent,6,0
bind=SUPER+shift,7,tagsilent,7,0
bind=SUPER+shift,8,tagsilent,8,0
bind=SUPER+shift,9,tagsilent,9,0

# monitor switch
bind=SUPER+Alt+shift,Left,focusmon,left
bind=SUPER+Alt+shift,Right,focusmon,right
# bind=SUPER+Alt,Left,tagmon,left
# bind=SUPER+Alt,Right,tagmon,right

# gaps
# bind=ALT+SHIFT,X,incgaps,1
# bind=ALT+SHIFT,Z,incgaps,-1
# bind=ALT+SHIFT,R,togglegaps

# movewin
# bind=CTRL+SHIFT,Up,movewin,+0,-50
# bind=CTRL+SHIFT,Down,movewin,+0,+50
# bind=CTRL+SHIFT,Left,movewin,-50,+0
# bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=SUPER+ALT,Up,resizewin,+0,-100
bind=SUPER+ALT,Down,resizewin,+0,+100
bind=SUPER+ALT,Left,resizewin,-100,+0
bind=SUPER+ALT,Right,resizewin,+100,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi

xwayland_persistence = 0
syncobj_enable = 1
allow_tearing = 2

exec-once=noctalia
exec-once=term

exec=~/.config/mango/update-env.sh
source-optional=~/.config/mango/env.conf

source=~/.config/mango/noctalia.conf
